<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>WYRM STUDIO · Client Vault (Images + PDFs)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* MAIN VAULT */
        .vault {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* header / studio identity */
        .studio-header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .brand {
            font-weight: 600;
            letter-spacing: 3px;
            font-size: 0.9rem;
            background: rgba(255,255,245,0.08);
            display: inline-block;
            padding: 0.3rem 1.8rem;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            color: #ddd9ff;
        }
        .brand strong {
            color: white;
            font-weight: 700;
        }

        /* SWITCHER — toggle between Images and PDFs */
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0 1.5rem 0;
        }
        .mode-btn {
            background: rgba(20,20,32,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #e2e0ff;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .mode-btn.active {
            background: white;
            color: #0a0a12;
            border-color: white;
            box-shadow: 0 4px 14px rgba(255,255,255,0.2);
        }
        .mode-btn:active { transform: scale(0.97); }

        /* GALLERY CORE (shared wrapper) */
        .gallery-core {
            width: 100%;
            background: #030303;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 25px 45px -12px black;
        }

        .viewport {
            position: relative;
            width: 100%;
            background: #000000;
            touch-action: pan-y pinch-zoom;
        }

        .slide-track {
            display: flex;
            width: 100%;
            transition: transform 0.45s cubic-bezier(0.2, 0.85, 0.3, 1);
            will-change: transform;
        }

        .slide {
            flex: 0 0 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            padding: 1.2rem;
            min-height: 55vh;
        }

        /* IMAGE display — big, perfect size */
        .image-box {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
        }
        .image-box img {
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            cursor: zoom-in;
            transition: transform 0.2s ease;
            border-radius: 20px;
        }
        .image-box.zoomed img {
            cursor: zoom-out;
            transform: scale(1.6);
        }

        /* PDF display — embedded viewer / full interactive */
        .pdf-container {
            width: 100%;
            height: 70vh;
            background: #1a1a24;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .pdf-fallback {
            background: #0f0f17;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
            text-align: center;
            color: #bbb;
        }
        .pdf-fallback a {
            color: white;
            background: #2c2c44;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
        }

        /* navigation buttons + counter */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20,20,28,0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 52px;
            height: 52px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            color: white;
            font-size: 2rem;
            font-weight: 300;
            transition: 0.2s;
        }
        .nav-arrow:hover { background: rgba(110, 90, 200, 0.9); transform: translateY(-50%) scale(1.02); }
        .prev-btn { left: 12px; }
        .next-btn { right: 12px; }

        .counter-badge {
            position: absolute;
            bottom: 1.2rem;
            left: 1.5rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #eee;
            z-index: 12;
            pointer-events: none;
            font-family: monospace;
        }

        .dots-panel {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 22px 0 18px 0;
            flex-wrap: wrap;
        }
        .dot-nav {
            width: 8px;
            height: 8px;
            background: rgba(200,200,220,0.35);
            border-radius: 20px;
            transition: 0.25s;
            cursor: pointer;
        }
        .dot-nav.active {
            width: 32px;
            background: white;
            box-shadow: 0 0 6px #fff8;
        }

        /* delivery statement */
        .delivery-statement {
            text-align: center;
            margin-top: 1.2rem;
            background: rgba(10,10,15,0.5);
            backdrop-filter: blur(12px);
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            width: fit-content;
            max-width: 95%;
            align-self: center;
            border: 0.5px solid rgba(255,255,240,0.1);
        }
        .delivery-statement p {
            font-size: 0.85rem;
            color: #cdcdff;
        }
        .delivery-statement strong {
            color: white;
            background: rgba(255,255,255,0.08);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .client-contact {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 0.8rem 0 0.5rem;
        }
        .contact-btn {
            background: rgba(20,20,32,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #f0efff;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 0.5px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .contact-btn:hover { background: white; color: black; }

        .watermark-footer {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
            margin: 0.8rem 0 0.3rem;
        }

        @media (max-width: 680px) {
            .vault { padding: 0.7rem; }
            .slide { padding: 0.8rem; }
            .image-box img { max-height: 60vh; }
            .pdf-container { height: 55vh; }
            .nav-arrow { width: 42px; height: 42px; font-size: 1.6rem; }
            .prev-btn { left: 6px; }
            .next-btn { right: 6px; }
            .mode-btn { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
            .counter-badge { bottom: 0.8rem; left: 1rem; font-size: 0.7rem; }
        }
        @media (min-width: 1200px) {
            .image-box img { max-height: 78vh; }
            .pdf-container { height: 75vh; }
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2rem;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box {
            background: rgba(255,80,80,0.12);
            border-left: 3px solid #ff9f7a;
            padding: 1rem;
            border-radius: 20px;
            color: #ffcfc0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="vault">
    <div class="studio-header">
        <div class="brand"><strong>WYRM STUDIO</strong> · confidential client delivery</div>
    </div>

    <!-- SWITCHER: Images vs PDFs -->
    <div class="mode-switch">
        <button class="mode-btn" id="imagesModeBtn">🖼️ VISUAL WORK</button>
        <button class="mode-btn" id="pdfsModeBtn">📄 DOCUMENTS / PDFs</button>
    </div>

    <div class="gallery-core">
        <div class="viewport" id="viewportGallery">
            <div class="slide-track" id="slideTrack"></div>
            <button class="nav-arrow prev-btn" id="prevSlideBtn" aria-label="Previous">‹</button>
            <button class="nav-arrow next-btn" id="nextSlideBtn" aria-label="Next">›</button>
        </div>
        <div class="dots-panel" id="dotsPanel"></div>
    </div>

    <div class="delivery-statement">
        <p>✦ <strong>THIS WEBSITE IS MADE TO DELIVER YOUR WORK — IMAGES + PDFs</strong> ✦<br>
        Switch between pages: see full-resolution designs & documents. Perfect on phone and PC.</p>
    </div>

    <div class="client-contact">
        <a href="#" id="discussBtn" class="contact-btn" target="_blank"><span>💬</span> Discuss this work</a>
        <a href="https://www.instagram.com/wyrm.studios/" class="contact-btn" target="_blank">📸 @wyrm.studios</a>
    </div>
    <div class="watermark-footer">WYRM.STUDIO — client exclusive preview</div>
</div>

<script>
    // ======================= CONFIG ==========================
    const REPO_CONFIG = {
        owner: "wyrm-studios",
        repo: "review.work",
        folder: "work",
        imageExts: ["jpg", "jpeg", "png", "webp", "gif", "avif"],
        pdfExt: "pdf"
    };

    // Data states
    let imageItems = [];     // { name, url }
    let pdfItems = [];
    let currentMode = "images";   // "images" or "pdfs"
    let currentIndex = 0;
    let activeZoomContainer = null;
    let isDragging = false;
    let dragStartX = 0;
    let dragDelta = 0;
    
    // DOM elements
    const trackElement = document.getElementById('slideTrack');
    const dotsPanel = document.getElementById('dotsPanel');
    const viewport = document.getElementById('viewportGallery');
    const imagesModeBtn = document.getElementById('imagesModeBtn');
    const pdfsModeBtn = document.getElementById('pdfsModeBtn');
    const prevBtn = document.getElementById('prevSlideBtn');
    const nextBtn = document.getElementById('nextSlideBtn');
    const discussBtn = document.getElementById('discussBtn');

    // 1) FETCH from GitHub and separate images + PDFs
    async function fetchAllAssets() {
        const apiUrl = `https://api.github.com/repos/${REPO_CONFIG.owner}/${REPO_CONFIG.repo}/contents/${REPO_CONFIG.folder}`;
        const response = await fetch(apiUrl);
        if (!response.ok) {
            throw new Error(`GitHub error (${response.status}). Ensure repo: wyrm-studios/review.work/work exists`);
        }
        const files = await response.json();
        if (!Array.isArray(files)) throw new Error("Invalid GitHub response");

        const images = [];
        const pdfs = [];
        for (const file of files) {
            if (file.type !== 'file') continue;
            const ext = file.name.split('.').pop().toLowerCase();
            if (REPO_CONFIG.imageExts.includes(ext)) {
                images.push({ name: file.name, url: file.download_url });
            } else if (ext === REPO_CONFIG.pdfExt) {
                pdfs.push({ name: file.name, url: file.download_url });
            }
        }
        // sort alphanumerically
        const sortFn = (a,b) => a.name.localeCompare(b.name, undefined, {numeric: true});
        images.sort(sortFn);
        pdfs.sort(sortFn);
        return { images, pdfs };
    }

    // 2) RENDER based on current mode
    function renderCurrentMode() {
        if (!trackElement) return;
        const items = (currentMode === "images") ? imageItems : pdfItems;
        if (items.length === 0) {
            trackElement.innerHTML = `<div class="slide" style="justify-content:center;"><div class="error-box">📭 No ${currentMode === "images" ? "images" : "PDFs"} found in /work folder.<br>Add files to wyrm-studios/review.work/work</div></div>`;
            if (dotsPanel) dotsPanel.innerHTML = '';
            updateCounterBadge(0,0);
            return;
        }
        
        trackElement.innerHTML = '';
        items.forEach((item, idx) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';
            if (currentMode === "images") {
                const imageBox = document.createElement('div');
                imageBox.className = 'image-box';
                imageBox.setAttribute('data-idx', idx);
                const img = document.createElement('img');
                img.src = item.url;
                img.alt = `Client work ${idx+1}: ${item.name}`;
                img.loading = idx === 0 ? 'eager' : 'lazy';
                img.draggable = false;
                imageBox.appendChild(img);
                slideDiv.appendChild(imageBox);
            } 
            else {  // PDF mode
                const pdfContainer = document.createElement('div');
                pdfContainer.className = 'pdf-container';
                // Use embed for best preview (mobile friendly)
                const viewer = document.createElement('iframe');
                viewer.className = 'pdf-viewer';
                viewer.src = item.url;
                viewer.title = `PDF: ${item.name}`;
                viewer.setAttribute('allow', 'fullscreen');
                // Fallback iframe fails gracefully
                pdfContainer.appendChild(viewer);
                // Small label under PDF (optional)
                const pdfLabel = document.createElement('div');
                pdfLabel.style.cssText = 'background:#0a0a12; text-align:center; padding:6px; font-size:0.7rem; color:#aaa; border-top:1px solid #222;';
                pdfLabel.innerText = `📄 ${item.name}`;
                pdfContainer.appendChild(pdfLabel);
                slideDiv.appendChild(pdfContainer);
            }
            trackElement.appendChild(slideDiv);
        });
        
        updateDotsUI(items.length);
        updateSlideTransform(false);
        attachZoomForImages(); // only relevant for image mode
        updateCounterBadge(items.length, currentIndex);
        updateContactMessage();
    }

    function updateDotsUI(totalItems) {
        if (!dotsPanel) return;
        dotsPanel.innerHTML = '';
        if (totalItems === 0) return;
        for (let i = 0; i < totalItems; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot-nav');
            if (i === currentIndex) dot.classList.add('active');
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                goToSlide(i);
            });
            dotsPanel.appendChild(dot);
        }
    }

    function updateSlideTransform(withTransition = true) {
        if (!trackElement) return;
        const total = (currentMode === "images") ? imageItems.length : pdfItems.length;
        if (total === 0) return;
        const percent = -currentIndex * 100;
        trackElement.style.transition = withTransition ? 'transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)' : 'none';
        trackElement.style.transform = `translateX(${percent}%)`;
        
        // update dots active
        const allDots = document.querySelectorAll('.dot-nav');
        allDots.forEach((dot, idx) => {
            if (idx === currentIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
        updateCounterBadge(total, currentIndex);
        if (currentMode === "images") resetAllZooms();
    }

    function goToSlide(newIndex, smooth = true) {
        let maxLen = (currentMode === "images") ? imageItems.length : pdfItems.length;
        if (maxLen === 0) return;
        if (newIndex < 0) newIndex = maxLen - 1;
        if (newIndex >= maxLen) newIndex = 0;
        currentIndex = newIndex;
        updateSlideTransform(smooth);
        updateContactMessage();
        if (currentMode === "images") resetAllZooms();
    }

    function changeSlide(delta) {
        goToSlide(currentIndex + delta);
    }

    function updateContactMessage() {
        if (!discussBtn) return;
        const items = (currentMode === "images") ? imageItems : pdfItems;
        if (items.length === 0) return;
        const currentFile = items[currentIndex]?.name || `item_${currentIndex+1}`;
        const modeText = currentMode === "images" ? "design" : "PDF document";
        const msg = `Hi WYRM.STUDIO! I'm interested in the ${modeText} "${currentFile}" (#${currentIndex+1}). Can we discuss?`;
        discussBtn.href = `https://www.instagram.com/wyrm.studios/?text=${encodeURIComponent(msg)}`;
    }

    function updateCounterBadge(total, idx) {
        let badge = document.querySelector('.counter-badge');
        if (!badge) {
            const newBadge = document.createElement('div');
            newBadge.className = 'counter-badge';
            viewport?.appendChild(newBadge);
            badge = newBadge;
        }
        if (total > 0) {
            badge.textContent = `${String(idx+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
        } else {
            badge.textContent = `0 / 0`;
        }
    }

    // zoom logic (images only)
    function attachZoomForImages() {
        const allImageBoxes = document.querySelectorAll('.image-box');
        allImageBoxes.forEach(box => {
            box.removeEventListener('click', handleImageZoom);
            box.addEventListener('click', handleImageZoom);
        });
    }

    function handleImageZoom(e) {
        const box = e.currentTarget;
        if (!box) return;
        if (activeZoomContainer && activeZoomContainer !== box) {
            activeZoomContainer.classList.remove('zoomed');
        }
        box.classList.toggle('zoomed');
        if (box.classList.contains('zoomed')) activeZoomContainer = box;
        else if (activeZoomContainer === box) activeZoomContainer = null;
    }

    function resetAllZooms() {
        if (activeZoomContainer) {
            activeZoomContainer.classList.remove('zoomed');
            activeZoomContainer = null;
        }
        document.querySelectorAll('.image-box').forEach(b => b.classList.remove('zoomed'));
    }

    // SWIPE + DRAG (for both modes)
    function initDragEvents() {
        if (!viewport) return;
        let startPointer = 0;
        let isSwiping = false;
        let startTransformPercent = 0;
        
        const onStart = (e) => {
            if (currentMode === "images" && activeZoomContainer) return; // avoid conflict while zoomed
            isSwiping = true;
            startPointer = (e.type === 'mousedown' ? e.pageX : e.touches[0].pageX);
            const transform = trackElement.style.transform;
            const match = transform.match(/translateX\(([-\d.]+)%/);
            startTransformPercent = match ? parseFloat(match[1]) : -(currentIndex * 100);
            trackElement.style.transition = 'none';
            e.preventDefault?.();
        };
        const onMove = (e) => {
            if (!isSwiping) return;
            const curX = (e.type === 'mousemove' ? e.pageX : e.touches[0].pageX);
            const diff = curX - startPointer;
            const viewportW = viewport.clientWidth;
            const percentShift = (diff / viewportW) * 100;
            let newShift = startTransformPercent + percentShift;
            trackElement.style.transform = `translateX(${newShift}%)`;
            dragDelta = diff;
        };
        const onEnd = () => {
            if (!isSwiping) return;
            isSwiping = false;
            const threshold = 45;
            if (Math.abs(dragDelta) > threshold) {
                if (dragDelta > 0) changeSlide(-1);
                else changeSlide(1);
            } else {
                updateSlideTransform(true);
            }
            dragDelta = 0;
            trackElement.style.transition = '';
        };
        viewport.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        viewport.addEventListener('touchstart', onStart, { passive: false });
        viewport.addEventListener('touchmove', onMove, { passive: false });
        viewport.addEventListener('touchend', onEnd);
        viewport.addEventListener('touchcancel', onEnd);
        viewport.addEventListener('dragstart', (e) => e.preventDefault());
    }

    function bindKeyboard() {
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); changeSlide(1); }
            else if (e.key === 'Escape') resetAllZooms();
        });
    }

    // Mode switching
    function setMode(mode) {
        if (mode === currentMode) return;
        currentMode = mode;
        currentIndex = 0;  // reset index when switching
        // update active button style
        if (mode === "images") {
            imagesModeBtn.classList.add('active');
            pdfsModeBtn.classList.remove('active');
        } else {
            pdfsModeBtn.classList.add('active');
            imagesModeBtn.classList.remove('active');
        }
        renderCurrentMode();
        updateContactMessage();
        resetAllZooms();
    }

    async function bootstrap() {
        showLoading(true);
        try {
            const { images, pdfs } = await fetchAllAssets();
            imageItems = images;
            pdfItems = pdfs;
            if (imageItems.length === 0 && pdfItems.length === 0) {
                throw new Error("No images or PDFs found in the /work folder.");
            }
            // default mode: images if available, else pdfs
            if (imageItems.length > 0) setMode("images");
            else if (pdfItems.length > 0) setMode("pdfs");
            else throw new Error("No assets found");
            showLoading(false);
        } catch (err) {
            console.error(err);
            showLoading(false, err.message);
        }
    }

    function showLoading(loading, errorMsg = null) {
        if (!trackElement) return;
        if (loading) {
            trackElement.innerHTML = `<div class="slide"><div class="loading-state"><div class="spinner"></div><span>Loading your secure gallery (images + PDFs)...</span></div></div>`;
            if (dotsPanel) dotsPanel.innerHTML = '';
        } else if (errorMsg) {
            trackElement.innerHTML = `<div class="slide"><div class="error-box"><strong>⚠️ ${errorMsg}</strong><br>Make sure your GitHub repo: wyrm-studios/review.work/work contains images (.jpg, .png) and/or PDFs.</div></div>`;
        }
    }

    // Event binding for UI
    function bindButtons() {
        prevBtn.addEventListener('click', () => changeSlide(-1));
        nextBtn.addEventListener('click', () => changeSlide(1));
        imagesModeBtn.addEventListener('click', () => { if (imageItems.length) setMode("images"); else alert("No images found in /work folder"); });
        pdfsModeBtn.addEventListener('click', () => { if (pdfItems.length) setMode("pdfs"); else alert("No PDFs found in /work folder"); });
        initDragEvents();
        bindKeyboard();
    }

    bootstrap().then(() => {
        bindButtons();
        // additional fix: ensure pdf iframe touch scroll not blocked
        const style = document.createElement('style');
        style.textContent = `.pdf-viewer { width: 100%; height: 100%; background: white; }`;
        document.head.appendChild(style);
    }).catch(e => showLoading(false, e.message));
</script>
</body>
</html>
